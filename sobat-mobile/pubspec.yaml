name: sobat_hr
description: "SOBAT HR - Human Resource Management System Mobile App"
publish_to: 'none'

version: 1.0.7+27

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  
  # Firebase
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  dio: ^5.4.3
  signature: ^6.3.0
  
  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4
  sqflite: ^2.3.0

  # Utils
  intl: ^0.20.2
  open_file: ^3.5.11
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  webview_flutter: ^4.7.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  permission_handler: ^12.0.1
  camera: ^0.12.0
  path: ^1.9.1
  in_app_update: ^4.0.2
  google_mlkit_face_detection: ^0.13.1
  device_info_plus: ^12.3.0
  local_auth: ^3.0.0
  screen_protector: ^1.5.1

  # QR Scanner
  mobile_scanner: ^7.2.0

  # Background Sync
  workmanager: ^0.9.0

  # Connectivity
  connectivity_plus: ^7.0.0
  
  http: ^1.2.0
  http_parser: ^4.0.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0
  awesome_dialog: ^3.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path_ios: "assets/logo/ios.png" #ios
  image_path_android: "assets/logo/googleplay.png" #android
  min_sdk_android: 21 # android min sdk min:16, default 21

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/logo/ios.png
    - assets/logo/googleplay.png
    - assets/images/
    - assets/icons/leave.png
    - assets/icons/history.png
    - assets/icons/overtime.png
    - assets/icons/bussines-trip.png
    - assets/icons/payslip.png
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

dependency_overrides:
  workmanager: ^0.9.0
